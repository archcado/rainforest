<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CANOPY 照護知識 — 科學驗證的雨林植物照護指南，涵蓋澆水、光照、濕度、病蟲害等主題。">
  <title>照護知識｜CANOPY</title>

  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/care.css">
</head>

<body>

  <header class="site-header" role="banner">
    <!-- 共用 Header 載入位置（components/header.html）-->
  </header>

  <main class="site-main">

    <div class="breadcrumb-bar">
      <div class="container">
        <nav class="breadcrumb" aria-label="麵包屑">
          <ol class="breadcrumb__list" role="list">
            <li class="breadcrumb__item"><a class="breadcrumb__link" href="../../index.html">首頁</a></li>
            <li class="breadcrumb__item"><span class="breadcrumb__current" aria-current="page">照護知識</span></li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="page-hero" aria-labelledby="care-title">
      <div class="container">
        <h1 class="page-hero__title" id="care-title">照護知識</h1>
        <p class="page-hero__desc">從澆水到病蟲害，提供可實際執行的植物照護指南。</p>
      </div>
    </section>

    <section class="page-content">
      <div class="container">

        <!-- 分類標籤 -->
        <div class="care-categories" role="tablist" aria-label="照護分類">
          <button class="care-category-tab care-category-tab--active" role="tab" aria-selected="true" data-category="all">全部</button>
          <button class="care-category-tab" role="tab" aria-selected="false" data-category="watering">澆水</button>
          <button class="care-category-tab" role="tab" aria-selected="false" data-category="light">光照</button>
          <button class="care-category-tab" role="tab" aria-selected="false" data-category="humidity">濕度</button>
          <button class="care-category-tab" role="tab" aria-selected="false" data-category="soil">介質</button>
          <button class="care-category-tab" role="tab" aria-selected="false" data-category="repotting">換盆</button>
          <button class="care-category-tab" role="tab" aria-selected="false" data-category="fertilizing">施肥</button>
          <button class="care-category-tab" role="tab" aria-selected="false" data-category="pests">病蟲害</button>
        </div>

        <!-- 文章格狀 -->
        <div class="care-grid" id="care-grid" aria-live="polite">
          <!-- 照護文章卡片由 JavaScript 動態載入 -->
        </div>

      </div>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <!-- 共用 Footer 載入位置（components/footer.html）-->
  </footer>

  <script src="../../assets/js/layout.js" defer></script>
  <script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>

</body>
</html>
