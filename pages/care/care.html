            <p class="care-eyebrow">RESOURCE LIBRARY</p>

            <p>以內容類型找到閱讀方向，再依植物問題與環境主題縮小範圍。</p>
          </div>
          <label class="care-search">

        </div>

        <div class="care-filter-panel">
          <div class="care-type-tabs" role="tablist" aria-label="內容類型">
            <button class="care-type-tab care-type-tab--active" type="button" role="tab" aria-selected="true" data-care-type="all">全部內容</button>

              <option value="all">所有主題</option>
              <option value="watering">澆水</option>
              <option value="light">光照</option>
              <option value="humidity">濕度</option>
              <option value="soil">介質</option>
              <option value="repotting">換盆</option>
              <option value="fertilizing">施肥</option>
              <option value="pests">病蟲害</option>
              <option value="maintenance">日常整理</option>
              <option value="environment">環境</option>
              <option value="tools">工具</option>
              <option value="styling">空間配置</option>
