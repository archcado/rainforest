<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CANOPY 照護資源，提供照護指南、問題診斷、好物分享與空間靈感。">
  <title>照護資源｜CANOPY</title>
  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/care.css?v=20260719-2">
</head>
<body data-care-page>
  <header class="site-header" role="banner"></header>
  <main class="site-main">
    <div class="breadcrumb-bar">
      <div class="container">
        <nav class="breadcrumb" aria-label="麵包屑">
          <ol class="breadcrumb__list" role="list">
            <li class="breadcrumb__item"><a class="breadcrumb__link" href="../../index.html">首頁</a></li>
            <li class="breadcrumb__item"><span class="breadcrumb__current" aria-current="page">照護資源</span></li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="care-page-hero" aria-labelledby="care-title">
      <div class="container care-page-hero__inner">
        <div class="care-page-hero__copy">
          <p class="care-eyebrow">CANOPY FIELD NOTES</p>
          <h1 class="hero-title-lines" id="care-title">
            <span class="page-hero__title-line">讓照護有依據</span>
            <span class="page-hero__title-line">也保留生活的餘裕</span>
          </h1>
          <p>從環境判讀、問題診斷到真正好用的工具，整理成可以立即執行的雨林植物資源。</p>
          <a class="btn btn--primary" href="#resource-library">探索全部資源</a>
        </div>
        <div class="care-page-hero__visual" aria-hidden="true">
          <span class="care-orbit care-orbit--one"></span>
          <span class="care-orbit care-orbit--two"></span>
          <picture class="care-hero__plant-media">
            <source
              srcset="../../assets/images/care/canopy-dieffenbachia-care-hero.webp"
              type="image/webp"
            />
            <img
              src="../../assets/images/care/canopy-dieffenbachia-care-hero.png"
              alt="花葉萬年青植物標本插畫"
              class="care-hero__plant-image"
              width="1600"
              height="1800"
              loading="eager"
              decoding="async"
            />
          </picture>
          <span class="care-hero-note care-hero-note--light">光線</span>
          <span class="care-hero-note care-hero-note--water">水分</span>
          <span class="care-hero-note care-hero-note--soil">介質</span>
        </div>
      </div>
    </section>

    <section class="care-featured section" aria-labelledby="featured-title">
      <div class="container">
        <div class="section__header care-section-heading">
          <div>
            <p class="care-eyebrow">EDITOR'S PICK</p>
            <h2 class="section__title" id="featured-title">本週精選</h2>
          </div>
          <p>先從最常遇到的光線、澆水與問題判讀開始。</p>
        </div>
        <div class="care-featured-grid" data-care-featured aria-live="polite">
          <p class="care-loading">正在整理精選資源…</p>
        </div>
      </div>
    </section>

    <section class="care-library section" id="resource-library" aria-labelledby="library-title">
      <div class="container">
        <div class="care-library__header">
          <div>
            <p class="care-eyebrow">RESOURCE LIBRARY</p>
            <h2 class="section__title" id="library-title">照護資源庫</h2>
            <p>以內容類型找到閱讀方向，再依植物問題與環境主題縮小範圍。</p>
          </div>
          <label class="care-search">
            <span class="sr-only">搜尋照護資源</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4 4"/></svg>
            <input type="search" placeholder="搜尋文章、工具或問題…" data-care-search>
          </label>
        </div>

        <div class="care-filter-panel">
          <div class="care-type-tabs" role="tablist" aria-label="內容類型">
            <button class="care-type-tab care-type-tab--active" type="button" role="tab" aria-selected="true" data-care-type="all">全部內容</button>
            <button class="care-type-tab" type="button" role="tab" aria-selected="false" data-care-type="guide">照護指南</button>
            <button class="care-type-tab" type="button" role="tab" aria-selected="false" data-care-type="diagnosis">問題診斷</button>
            <button class="care-type-tab" type="button" role="tab" aria-selected="false" data-care-type="gear">好物分享</button>
            <button class="care-type-tab" type="button" role="tab" aria-selected="false" data-care-type="inspiration">空間靈感</button>
          </div>
          <label class="care-category-select">
            <span>主題</span>
            <select data-care-category>
              <option value="all">所有主題</option>
              <option value="watering">澆水</option>
              <option value="light">光照</option>
              <option value="humidity">濕度</option>
              <option value="soil">介質</option>
              <option value="repotting">換盆</option>
              <option value="fertilizing">施肥</option>
              <option value="pests">病蟲害</option>
              <option value="maintenance">日常整理</option>
              <option value="environment">環境</option>
              <option value="tools">工具</option>
              <option value="styling">空間配置</option>
            </select>
          </label>
        </div>

        <div class="care-result-bar">
          <p data-care-count>正在載入資源…</p>
          <p>文章收藏會保留在這個瀏覽器中。</p>
        </div>
        <div class="care-grid" data-care-grid aria-live="polite"></div>
        <div class="care-empty-state" data-care-empty hidden>
          <h3>沒有符合條件的資源</h3>
          <p>試著更換內容類型、主題或搜尋文字。</p>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer" role="contentinfo"></footer>
  <script src="../../assets/js/layout.js" defer></script>
  <script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/pages/care.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>
</body>
</html>
