  <link rel="stylesheet" href="../../assets/css/tokens.css">

          <p class="order-number text-muted" style="margin-block:1.5rem;font-size:.875rem">

          <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-block-start:2rem">

        </div>
      </div>

    <!-- 共用 Footer 載入位置（components/footer.html）-->
