<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CANOPY 會員登入 — 管理收藏、購物車、收件地址與訂單。">
  <title>會員登入｜CANOPY</title>
  <link rel="stylesheet" href="../../assets/css/tokens.css"><link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css"><link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css"><link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/member.css">
</head>
<body>
  <header class="site-header" role="banner"></header>
  <main class="site-main auth-page">
    <section class="page-content"><div class="container container--xs">
      <div class="auth-box">
        <p class="auth-box__eyebrow">CANOPY MEMBER</p><h1 class="auth-box__title">會員登入</h1>
        <p class="auth-box__description">登入後可同步收藏、購物車、收件地址與訂單紀錄。</p>
        <form class="auth-form" data-login-form novalidate>
          <div class="form-group"><label class="form-label form-label--required" for="login-email">電子信箱</label><input id="login-email" class="form-input" type="email" name="email" required autocomplete="email"></div>
          <div class="form-group"><label class="form-label form-label--required" for="login-password">密碼</label><input id="login-password" class="form-input" type="password" name="password" required minlength="8" autocomplete="current-password"></div>
          <div class="auth-form__utility"><a href="./forgot-password.html">忘記密碼？</a></div>
          <button class="btn btn--primary btn--lg" type="submit">登入</button>
          <p class="form-status" data-auth-status role="status" aria-live="polite"></p>
        </form>
        <p class="auth-box__switch">還沒有帳戶？<a href="./register.html">立即註冊</a></p>
      </div>
    </div></section>
  </main>
  <footer class="site-footer" role="contentinfo"></footer>
  <script src="../../assets/js/layout.js" defer></script><script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/toast.js" defer></script><script src="../../assets/js/pages/member-pages.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>
</body></html>
