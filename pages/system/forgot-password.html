<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="重設 CANOPY 會員密碼。"><title>忘記密碼｜CANOPY</title>
  <link rel="stylesheet" href="../../assets/css/tokens.css"><link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css"><link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css"><link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/member.css">
</head>
<body>
  <header class="site-header" role="banner"></header>
  <main class="site-main auth-page"><section class="page-content"><div class="container container--xs">
    <div class="auth-box">
      <p class="auth-box__eyebrow">PASSWORD RESET</p><h1 class="auth-box__title">忘記密碼</h1>
      <p class="auth-box__description">輸入註冊信箱。正式環境可由 n8n 或郵件服務寄送一次性重設連結。</p>
      <form class="auth-form" data-forgot-form>
        <div class="form-group"><label class="form-label" for="forgot-email">電子信箱</label><input id="forgot-email" class="form-input" type="email" name="email" required autocomplete="email"></div>
        <button class="btn btn--primary" type="submit">取得重設方式</button>
        <p class="form-status" data-auth-status role="status"></p>
      </form>
      <form class="auth-form auth-form--separated" data-reset-form hidden>
        <input type="hidden" name="token">
        <div class="form-group"><label class="form-label" for="reset-password">設定新密碼</label><input id="reset-password" class="form-input" type="password" name="password" minlength="8" required autocomplete="new-password"></div>
        <button class="btn btn--secondary" type="submit">更新密碼</button>
        <p class="form-status" data-reset-note role="status"></p>
      </form>
      <p class="auth-box__switch"><a href="./login.html">返回登入</a></p>
    </div>
  </div></section></main>
  <footer class="site-footer" role="contentinfo"></footer>
  <script src="../../assets/js/layout.js" defer></script><script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/toast.js" defer></script><script src="../../assets/js/pages/member-pages.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>
</body></html>
