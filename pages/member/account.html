<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CANOPY 帳戶設定 — 管理個人資訊、密碼與通知偏好。">
  <title>帳戶設定｜CANOPY</title>

  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/member.css">
</head>

<body>

  <header class="site-header" role="banner">
    <!-- 共用 Header 載入位置（components/header.html）-->
  </header>

  <main class="site-main">

    <div class="breadcrumb-bar">
      <div class="container">
        <nav class="breadcrumb" aria-label="麵包屑">
          <ol class="breadcrumb__list" role="list">
            <li class="breadcrumb__item"><a class="breadcrumb__link" href="../../index.html">首頁</a></li>
            <li class="breadcrumb__item"><span class="breadcrumb__current" aria-current="page">帳戶設定</span></li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="page-content">
      <div class="container">
        <div class="member-layout">

          <!-- 會員側邊導覽 -->
          <nav class="member-nav" aria-label="會員功能">
            <a class="member-nav__item member-nav__item--active" href="./account.html" aria-current="page">帳戶設定</a>
            <a class="member-nav__item" href="./my-plants.html">我的植物</a>
            <a class="member-nav__item" href="./plant-journal.html">植物日誌</a>
            <a class="member-nav__item" href="./favorites.html">我的收藏</a>
            <a class="member-nav__item" href="./orders.html">訂單記錄</a>
            <a class="member-nav__item" href="./notifications.html">通知設定</a>
          </nav>

          <!-- 帳戶設定主區 -->
          <div>
            <h1 class="page-hero__title">帳戶設定</h1>

            <form class="account-form" action="#" method="post" novalidate style="margin-block-start:1.5rem">
              <fieldset>
                <legend class="section__title">個人資訊</legend>
                <div class="grid grid--2" style="margin-block-start:1rem">
                  <div class="form-group">
                    <label class="form-label" for="account-name">姓名</label>
                    <input id="account-name" class="form-input" type="text" name="name" autocomplete="name">
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="account-email">電子信箱</label>
                    <input id="account-email" class="form-input" type="email" name="email" autocomplete="email">
                  </div>
                </div>
              </fieldset>

              <button class="btn btn--primary" type="submit" style="margin-block-start:1.5rem">儲存變更</button>
            </form>
          </div>

        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <!-- 共用 Footer 載入位置（components/footer.html）-->
  </footer>

  <script src="../../assets/js/layout.js" defer></script>
  <script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/toast.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>

</body>
</html>
