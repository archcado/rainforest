<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CANOPY 通知設定 — 管理訂單更新與電子報訂閱偏好。">
  <title>通知設定｜CANOPY</title>

  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/member.css">
</head>

<body data-member-required>

  <header class="site-header" role="banner">
    <!-- 共用 Header 載入位置（components/header.html）-->
  </header>

  <main class="site-main">

    <div class="breadcrumb-bar">
      <div class="container">
        <nav class="breadcrumb" aria-label="麵包屑">
          <ol class="breadcrumb__list" role="list">
            <li class="breadcrumb__item"><a class="breadcrumb__link" href="../../index.html">首頁</a></li>
            <li class="breadcrumb__item"><span class="breadcrumb__current" aria-current="page">通知設定</span></li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="page-content">
      <div class="container">
        <div class="member-layout">

          <nav class="member-nav" aria-label="會員功能">
            <a class="member-nav__item" href="./account.html">帳戶設定</a>
            <a class="member-nav__item" href="./favorites.html">我的收藏</a>
            <a class="member-nav__item" href="../commerce/cart.html">購物車</a>
            <a class="member-nav__item" href="./orders.html">訂單記錄</a>
            <a class="member-nav__item member-nav__item--active" href="./notifications.html" aria-current="page">通知設定</a>
            <button class="member-nav__logout" type="button" data-logout>登出</button>
          </nav>

          <div>
            <h1 class="page-hero__title">通知設定</h1>

            <form action="#" method="post" novalidate style="margin-block-start:1.5rem">
              <fieldset>
                <legend class="section__title">訂單通知</legend>
                <div class="form-group" style="margin-block-start:1rem;display:flex;align-items:center;gap:.75rem">
                  <input type="checkbox" id="notify-order" name="notify-order" class="form-checkbox">
                  <label for="notify-order">訂單狀態更新</label>
                </div>
              </fieldset>

              <fieldset style="margin-block-start:1.5rem">
                <legend class="section__title">電子報</legend>
                <div class="form-group" style="margin-block-start:1rem;display:flex;align-items:center;gap:.75rem">
                  <input type="checkbox" id="notify-newsletter" name="notify-newsletter" class="form-checkbox">
                  <label for="notify-newsletter">訂閱 CANOPY 電子報</label>
                </div>
              </fieldset>

              <button class="btn btn--primary" type="submit" style="margin-block-start:1.5rem">儲存設定</button>
            </form>
          </div>

        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <!-- 共用 Footer 載入位置（components/footer.html）-->
  </footer>

  <script src="../../assets/js/layout.js" defer></script>
  <script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/toast.js" defer></script>
  <script src="../../assets/js/pages/member-pages.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>

</body>
</html>
