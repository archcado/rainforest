<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CANOPY 植物日誌 — 記錄每株植物的照護歷程、澆水紀錄與生長觀察。">
  <title>植物日誌｜CANOPY</title>

  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/member.css">
</head>

<body>

  <header class="site-header" role="banner">
    <!-- 共用 Header 載入位置（components/header.html）-->
  </header>

  <main class="site-main">

    <div class="breadcrumb-bar">
      <div class="container">
        <nav class="breadcrumb" aria-label="麵包屑">
          <ol class="breadcrumb__list" role="list">
            <li class="breadcrumb__item"><a class="breadcrumb__link" href="../../index.html">首頁</a></li>
            <li class="breadcrumb__item"><span class="breadcrumb__current" aria-current="page">植物日誌</span></li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="page-content">
      <div class="container">
        <div class="member-layout">

          <nav class="member-nav" aria-label="會員功能">
            <a class="member-nav__item" href="./account.html">帳戶設定</a>
            <a class="member-nav__item" href="./my-plants.html">我的植物</a>
            <a class="member-nav__item member-nav__item--active" href="./plant-journal.html" aria-current="page">植物日誌</a>
            <a class="member-nav__item" href="./favorites.html">我的收藏</a>
            <a class="member-nav__item" href="./orders.html">訂單記錄</a>
            <a class="member-nav__item" href="./notifications.html">通知設定</a>
          </nav>

          <div>
            <h1 class="page-hero__title">植物日誌</h1>

            <!-- 植物選擇器 -->
            <div class="journal-plant-selector" style="margin-block-start:1.5rem">
              <label class="form-label" for="journal-plant-select">選擇植物</label>
              <select id="journal-plant-select" class="form-select" name="plant">
                <option value="">— 選擇一株植物 —</option>
                <!-- 選項由 JavaScript 動態載入 -->
              </select>
            </div>

            <!-- 新增日誌入口 -->
            <div style="margin-block-start:1.5rem">
              <button class="btn btn--primary btn--sm" type="button" id="add-journal-entry-btn">
                + 新增紀錄
              </button>
            </div>

            <!-- 日誌時間軸 -->
            <ol class="journal-timeline" id="journal-timeline" aria-live="polite" style="margin-block-start:2rem;list-style:none;padding:0">
              <!-- 日誌條目由 plant-journal.js 動態載入 -->
            </ol>

          </div>

        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <!-- 共用 Footer 載入位置（components/footer.html）-->
  </footer>

  <!-- 新增日誌 Modal 預留區 -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <!-- Modal 內容（components/modal.html）-->
  </div>

  <script src="../../assets/js/layout.js" defer></script>
  <script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/modal.js" defer></script>
  <script src="../../assets/js/toast.js" defer></script>
  <script src="../../assets/js/plant-journal.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>

</body>
</html>
