<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="回答八個關於光照、照護能力、安全與購買需求的問題，找到適合購入的 CANOPY 觀葉植物。">
  <title>觀葉植物環境配對｜CANOPY</title>

  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/quiz.css">
</head>
<body>
  <header class="site-header"></header>

  <main class="site-main">
    <div class="breadcrumb-bar">
      <div class="container">
        <nav class="breadcrumb" aria-label="麵包屑">
          <ol class="breadcrumb__list">
            <li class="breadcrumb__item"><a class="breadcrumb__link" href="../../index.html">首頁</a></li>
            <li class="breadcrumb__item"><span class="breadcrumb__current" aria-current="page">植物配對</span></li>
          </ol>
        </nav>
      </div>
    </div>

    <section class="quiz-hero" aria-labelledby="quiz-page-title">
      <div class="container quiz-hero__inner">
        <div class="quiz-hero__copy">
          <p class="quiz-eyebrow">Plant Match</p>
          <h1 class="quiz-hero__title hero-title-lines" id="quiz-page-title">
            <span class="page-hero__title-line">讓環境決定</span>
            <span class="page-hero__title-line">適合長久生活的植物</span>
          </h1>
          <p class="quiz-hero__description">
            八個問題會比較實際光照、照護能力、安全條件、空間與預算，並從目前可購買的觀葉植物中提供最多三個結果。
          </p>
        </div>
        <aside class="quiz-hero__note" aria-label="配對原則">
          <strong>約 2 分鐘完成</strong>
          <p>條件符合度用來比較商品，不代表植物存活率。完全無光或寵物安全條件不符時，系統不會強行推薦。</p>
        </aside>
      </div>
    </section>

    <section class="quiz-stage" aria-label="植物配對問卷">
      <div class="container">
        <div class="quiz-shell">
          <div class="quiz-loading" id="quiz-loading" role="status" aria-live="polite">
            <span class="quiz-loading__leaf" aria-hidden="true"></span>
            <p>正在準備植物配對問題</p>
          </div>

          <section class="quiz-error" id="quiz-error" aria-labelledby="quiz-error-title" hidden>
            <h2 id="quiz-error-title">無法載入問卷</h2>
            <p>請確認目前使用 HTTP 伺服器開啟專案，再重新載入。</p>
            <button class="btn btn--primary" id="quiz-retry" type="button">重新載入</button>
          </section>

          <form class="quiz-form" id="plant-match-form" novalidate hidden>
            <div class="quiz-progress">
              <div class="quiz-progress__topline">
                <p class="quiz-progress__label" id="quiz-progress-label">第 1 題，共 8 題</p>
                <button class="quiz-reset" id="quiz-reset" type="button">重新開始</button>
              </div>
              <progress class="quiz-progress__bar" id="quiz-progress-bar" aria-label="問卷進度" value="1" max="8">1 / 8</progress>
            </div>

            <div class="quiz-question">
              <p class="quiz-question__category" id="quiz-question-category">環境條件</p>
              <h2 class="quiz-question__text" id="quiz-question-text" tabindex="-1">正在載入問題</h2>
              <p class="quiz-question__help" id="quiz-question-help"></p>
              <div class="quiz-options" id="quiz-options"></div>
            </div>

            <p class="sr-only" id="quiz-message" role="status" aria-live="polite"></p>

            <div class="quiz-nav">
              <button class="btn btn--ghost" id="quiz-prev" type="button" hidden>上一題</button>
              <button class="btn btn--primary btn--lg" id="quiz-next" type="submit" disabled>下一題</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer"></footer>

  <script src="../../assets/js/layout.js" defer></script>
  <script src="../../assets/js/quiz.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>
</body>
</html>
