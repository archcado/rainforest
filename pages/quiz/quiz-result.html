<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CANOPY 植物配對結果 — 依你的居家環境，為你推薦最合適的雨林植物。">
  <title>配對結果｜CANOPY</title>

  <link rel="stylesheet" href="../../assets/css/tokens.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/utilities.css">
  <link rel="stylesheet" href="../../assets/css/pages/quiz.css">
</head>

<body>

  <header class="site-header" role="banner">
    <!-- 共用 Header 載入位置（components/header.html）-->
  </header>

  <main class="site-main">

    <section class="page-content">
      <div class="container">
        <div class="quiz-result">

          <p class="text-muted">你的配對結果</p>
          <h1 class="quiz-result__match" id="result-match">—</h1>
          <p class="quiz-result__label" id="result-label">配對類型</p>

          <p id="result-desc" class="text-muted" style="max-width:50ch;margin-inline:auto">
            <!-- 結果說明由 JavaScript 動態載入 -->
          </p>

          <h2 class="section__title" style="margin-block-start:3rem">為你推薦的植物</h2>

          <div class="quiz-result__plants" id="result-plants">
            <!-- 推薦植物卡片由 JavaScript 動態載入 -->
          </div>

          <div style="margin-block-start:2rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
            <a class="btn btn--primary" href="./quiz.html">重新測驗</a>
            <a class="btn btn--secondary" href="../plants/plants.html">瀏覽全部植物</a>
          </div>

        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <!-- 共用 Footer 載入位置（components/footer.html）-->
  </footer>

  <script src="../../assets/js/layout.js" defer></script>
  <script src="../../assets/js/navigation.js" defer></script>
  <script src="../../assets/js/cart.js" defer></script>
  <script src="../../assets/js/quiz.js" defer></script>
  <script src="../../assets/js/toast.js" defer></script>
  <script src="../../assets/js/main.js" defer></script>

</body>
</html>
