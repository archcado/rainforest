<!--
  components/toast.html
  ─────────────────────────────────────────────
  Toast 通知容器骨架
  使用方式：插入 body 底部；toast.js 會動態注入個別通知。
  ─────────────────────────────────────────────
-->
<div
  class="toast-container"
  role="status"
  aria-live="polite"
  aria-atomic="false"
>
  <!-- Toast 項目由 toast.js 動態插入，範本如下：
  <div class="toast toast--success" role="status">
    <span class="toast__message">訊息文字</span>
    <button class="toast__close" aria-label="關閉通知">✕</button>
  </div>
  -->
</div>
