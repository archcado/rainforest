<div class="search-panel" role="dialog" aria-modal="true" aria-labelledby="search-panel-title" hidden>
  <button class="search-panel__backdrop" type="button" data-search-close aria-label="關閉搜尋"></button>
  <div class="search-panel__inner">
    <div class="search-panel__header">
      <div>
        <p class="search-panel__eyebrow">Search CANOPY</p>
        <h2 class="search-panel__title" id="search-panel-title">搜尋植物與照護文章</h2>
      </div>
      <button class="header-icon-btn" type="button" data-search-close aria-label="關閉搜尋">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg>
      </button>
    </div>
    <form class="search-panel__form" role="search" action="/pages/system/search-results.html">
      <label class="sr-only" for="search-input">輸入搜尋關鍵字</label>
      <input id="search-input" type="search" name="q" class="form-input search-panel__input" placeholder="輸入植物名稱、學名或照護主題" autocomplete="off" spellcheck="false">
      <button class="btn btn--primary" type="submit">搜尋</button>
    </form>
  </div>
</div>
